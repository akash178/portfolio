    <script>
        // ============================================
        // DYNAMIC PROJECT LOADING
        // ============================================
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function loadProjectDetails() {
            const projectId = getUrlParameter('projectid');

            if (!projectId) {
                document.body.innerHTML = '<div style="padding: 2rem; text-align: center;"><h2>Project not found</h2><p>Please select a project from the home page.</p><a href="index.html" class="btn btn-primary">Go Back</a></div>';
                return;
            }

            const project = getProjectById(projectId);

            if (!project) {
                document.body.innerHTML = '<div style="padding: 2rem; text-align: center;"><h2>Project not found</h2><p>The requested project does not exist.</p><a href="index.html" class="btn btn-primary">Go Back</a></div>';
                return;
            }

            // Update page title
            document.getElementById('pageTitle').textContent = `${project.title} | Akash Sharma - UI/UX Designer`;

            // Update hero section
            document.getElementById('projectTitle').textContent = project.title;
            const metaHTML = `
                <div class="project-meta-item">
                    <div class="project-meta-label">Role</div>
                    <div class="project-meta-value">${project.role}</div>
                </div>
                <div class="project-meta-item">
                    <div class="project-meta-label">Tools</div>
                    <div class="project-meta-value">${project.tools}</div>
                </div>
            `;
            document.getElementById('projectMeta').innerHTML = metaHTML;

            // Update overview section
            const overviewHTML = `
                <div class="project-overview-card">
                    <h3 style="font-size: 1.25rem; margin-bottom: 1rem;">Problem</h3>
                    <p style="color: var(--text-secondary); line-height: 1.8;">
                        ${project.overview.problem}
                    </p>
                </div>
                <div class="project-overview-card">
                    <h3 style="font-size: 1.25rem; margin-bottom: 1rem;">Solution</h3>
                    <p style="color: var(--text-secondary); line-height: 1.8;">
                        ${project.overview.solution}
                    </p>
                </div>
            `;
            document.getElementById('projectOverview').innerHTML = overviewHTML;

            // Update design process section
            if (project.designProcess && project.designProcess.length > 0) {

                const processHTML = project.designProcess.map((item, index) => `
                    <div class="timeline-item">
                        <div class="timeline-bullet">
                            <div class="bullet-number">${index + 1}</div>
                        </div>
                        <div class="timeline-body">
                            <h4>${item.title}</h4>
                            <p>${item.description}</p>
                        </div>
                    </div>
                `).join('');

                document.getElementById('projectDesignProcess').innerHTML = processHTML;
            }

            // Update gallery section
            const galleryHTML = project.gallery.map((item, index) => {
                // Check if item is an image path or emoji
                const isImage = typeof item === 'string' && (item.includes('.png') || item.includes('.jpg') || item.includes('.jpeg') || item.includes('.webp'));

                if (isImage) {
                    return `
                        <div class="gallery-item">
                            <a href="${item}" data-fancybox="gallery" data-caption="${project.title} - Image ${index + 1}" style="cursor: pointer;">
                                <div class="gallery-image"><img src="${item}" alt="${project.title}"></div>
                            </a>
                        </div>
                    `;
                } else {
                    return `
                        <div class="gallery-item">
                            <div class="gallery-image">${item}</div>
                        </div>
                    `;
                }
            }).join('');
            document.getElementById('projectGallery').innerHTML = galleryHTML;

            // Initialize Fancybox for gallery images
            Fancybox.bind('[data-fancybox="gallery"]');

            // Replace feather icons after loading
            setTimeout(() => {
                feather.replace();
            }, 0);
        }

        // ============================================
        // THEME MANAGEMENT
        // ============================================
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        function detectSystemTheme() {
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || detectSystemTheme();
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            htmlElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const icon = themeToggle.querySelector('i');
            if (theme === 'dark') {
                icon.setAttribute('data-feather', 'moon');
            } else {
                icon.setAttribute('data-feather', 'sun');
            }
            feather.replace();
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    setTheme(e.matches ? 'dark' : 'light');
                }
            });
        }

        // ============================================
        // BACK TO TOP BUTTON
        // ============================================
        const backToTopButton = document.getElementById('backToTop');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopButton.classList.add('show');
            } else {
                backToTopButton.classList.remove('show');
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadProjectDetails();
            feather.replace();
        });
    </script>
